<body>

<nav>

    <div class="logo">
        <span class="blue">F</span><span class="red">o</span><span class="yellow">c</span><span class="blue">u</span><span class="green">s</span><span>Flow</span>

    <button id="themeBtn">🌙</button>

</nav>

<section class="hero">

    <h1>📅 Calendar</h1>
    <p>Manage your schedule and keep track of important dates.</p>

    <div class="calendar-container">

        <div class="calendar-header">

            <button id="prevMonth">◀</button>

            <h2 id="monthYear"></h2>

            <button id="nextMonth">▶</button>

        </div>

        <div class="weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
        </div>

        <div id="calendarDays" class="calendar-grid"></div>

    </div>

    <h3>📋 Tasks for Selected Date</h3>
    <div id="selectedTasks">
        Click a date to view tasks.
    </div>
</div>

</section>

<script src="calendar.js"></script>
<script src="theme.js"></script>

</body>
</html>
